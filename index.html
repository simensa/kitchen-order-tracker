<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kitchen Order Manager</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 text-gray-800">
  <div class="max-w-7xl mx-auto">

    <h1 class="text-3xl font-bold mb-6 text-center">
      Kitchen Order Manager
    </h1>


    <!-- CREATE ORDER -->
    <div class="bg-white rounded-xl shadow p-4 mb-6">

      <h2 class="text-xl font-bold mb-4">
        Create Order
      </h2>


      <!-- MENU ITEMS -->
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-4">

        <div>
          <label class="font-bold text-sm block mb-1">
            Boneless
          </label>

          <input
            id="boneless"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            Half Boneless
          </label>

          <input
            id="halfboneless"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            8 Wings
          </label>

          <input
            id="wings8"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            4 Wings
          </label>

          <input
            id="wings4"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            Beef bulgogi
          </label>

          <input
            id="beefbulgogi"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            Jeyuk
          </label>

          <input
            id="jeyuk"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            Bibimbap
          </label>

          <input
            id="bibimbap"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            Bulgogi Japche
          </label>

          <input
            id="bulgogijapche"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>


        <div>
          <label class="font-bold text-sm block mb-1">
            Japche
          </label>

          <input
            id="japche"
            type="number"
            min="0"
            value="0"
            class="border rounded p-2 w-full"
          />
        </div>

      </div>


      <!-- PICKUP TIME -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

        <input
          id="timeInput"
          type="number"
          min="1"
          value="15"
          class="border rounded p-2"
          placeholder="Pickup in minutes"
        />

        <button
          id="addBtn"
          class="bg-orange-500 text-white rounded p-2 font-bold"
        >
          Add Order
        </button>

      </div>
    </div>



    <!-- NEXT 15 MIN SUMMARY -->
    <div class="bg-white rounded-xl shadow p-4 mb-6">

      <h2 class="text-xl font-bold mb-4">
        Production Needed Next 15 Minutes
      </h2>

      <div
        id="summary"
        class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3"
      ></div>

    </div>



    <!-- ACTIVE ORDERS -->
    <div class="bg-white rounded-xl shadow p-4">

      <h2 class="text-xl font-bold mb-4">
        Active Orders
      </h2>

      <div id="ordersContainer" class="space-y-3"></div>

    </div>
  </div>



  <script type="module">

    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getDatabase,
      ref,
      push,
      onValue,
      remove
    }
      from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";



    // FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAuxTOa79Q53VQ9-hFPVrbaopcUmb-k618",
      authDomain: "kitchen-tracker-6563e.firebaseapp.com",
      databaseURL: "https://kitchen-tracker-6563e-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "kitchen-tracker-6563e",
      storageBucket: "kitchen-tracker-6563e.firebasestorage.app",
      messagingSenderId: "910563195014",
      appId: "1:910563195014:web:7c826936ec28edfa273907"
    };



    // INIT FIREBASE
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ordersRef = ref(db, 'orders');



    // ELEMENTS
    const addBtn = document.getElementById('addBtn');
    const ordersContainer = document.getElementById('ordersContainer');
    const summaryContainer = document.getElementById('summary');



    // ADD ORDER
    addBtn.addEventListener('click', async () => {

      const items = {

        'Boneless':
          parseInt(document.getElementById('boneless').value) || 0,

        'Half Boneless':
          parseInt(document.getElementById('halfboneless').value) || 0,

        '8 Wings':
          parseInt(document.getElementById('wings8').value) || 0,

        '4 Wings':
          parseInt(document.getElementById('wings4').value) || 0,

        'Beef bulgogi':
          parseInt(document.getElementById('beefbulgogi').value) || 0,

        'Jeyuk':
          parseInt(document.getElementById('jeyuk').value) || 0,

        'Bibimbap':
          parseInt(document.getElementById('bibimbap').value) || 0,

        'Bulgogi Japche':
          parseInt(document.getElementById('bulgogijapche').value) || 0,

        'Japche':
          parseInt(document.getElementById('japche').value) || 0,
      };



      // CHECK IF ORDER HAS ITEMS
      const totalQty = Object.values(items)
        .reduce((sum, qty) => sum + qty, 0);

      if (totalQty === 0) {
        alert('Add at least one item');
        return;
      }



      // PICKUP TIME
      const minutes = parseInt(
        document.getElementById('timeInput').value
      );

      if (!minutes || minutes < 1) {
        alert('Pickup time must be at least 1 minute');
        return;
      }



      // CALCULATE READY TIME
      const readyAt = Date.now() + minutes * 60 * 1000;



      // SAVE ORDER
      await push(ordersRef, {
        items,
        readyAt,
        createdAt: Date.now()
      });



      // RESET INPUTS
      document.getElementById('boneless').value = 0;
      document.getElementById('halfboneless').value = 0;
      document.getElementById('wings8').value = 0;
      document.getElementById('wings4').value = 0;
      document.getElementById('beefbulgogi').value = 0;
      document.getElementById('jeyuk').value = 0;
      document.getElementById('bibimbap').value = 0;
      document.getElementById('bulgogijapche').value = 0;
      document.getElementById('japche').value = 0;

    });



    // REALTIME UPDATES
    onValue(ordersRef, (snapshot) => {

      const data = snapshot.val() || {};

      renderOrders(data);
      renderSummary(data);

    });



    // RENDER ORDERS
    function renderOrders(data) {

      ordersContainer.innerHTML = '';

      const entries = Object.entries(data)
        .sort((a, b) => a[1].readyAt - b[1].readyAt);



      entries.forEach(([id, order]) => {

        const itemLines = Object.entries(order.items)

          .filter(([_, qty]) => qty > 0)

          .map(([name, qty]) => `
            <div class="flex justify-between border-b py-1">
              <span>${name}</span>
              <span class="font-bold">${qty}</span>
            </div>
          `)

          .join('');



        const card = document.createElement('div');

        card.className =
          'bg-gray-50 border rounded-xl p-4';



        card.innerHTML = `
          <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">

            <div class="flex-1">

              <div class="text-lg font-bold mb-2">
                Order
              </div>

              ${itemLines}

            </div>


            <div class="text-center min-w-[140px]">

              <div class="text-sm text-gray-500 mb-1">
                Pickup In
              </div>

              <div
                id="timer-${id}"
                class="text-3xl font-bold"
              ></div>

            </div>


            <button
              class="deleteBtn bg-green-600 text-white px-4 py-2 rounded font-bold"
              data-id="${id}"
            >
              Completed
            </button>

          </div>
        `;



        ordersContainer.appendChild(card);

        startCountdown(id, order.readyAt);

      });



      // DELETE ORDER
      document.querySelectorAll('.deleteBtn').forEach(btn => {

        btn.addEventListener('click', async () => {

          const id = btn.dataset.id;

          await remove(ref(db, `orders/${id}`));

        });

      });

    }



    // TIMER
    function startCountdown(id, readyAt) {

      const el = document.getElementById(`timer-${id}`);

      function update() {

        const diff = readyAt - Date.now();

        if (diff <= 0) {

          el.innerHTML =
            '<span class="text-red-600">READY</span>';

          return;
        }

        const minutes =
          Math.floor(diff / 1000 / 60);

        const seconds =
          Math.floor((diff / 1000) % 60);

        el.innerText =
          `${minutes}m ${seconds}s`;
      }

      update();

      setInterval(update, 1000);

    }



    // NEXT 15 MIN SUMMARY
    function renderSummary(data) {

      summaryContainer.innerHTML = '';

      const totals = {

        'Boneless': 0,
        'Half Boneless': 0,
        '8 Wings': 0,
        '4 Wings': 0,
        'Beef bulgogi': 0,
        'Jeyuk': 0,
        'Bibimbap': 0,
        'Bulgogi Japche': 0,
        'Japche': 0

      };



      const now = Date.now();
      const next15 = now + 15 * 60 * 1000;



      Object.values(data).forEach(order => {

        if (order.readyAt <= next15) {

          Object.entries(order.items).forEach(([item, qty]) => {

            totals[item] += qty;

          });
        }
      });



      // RENDER SUMMARY
      Object.entries(totals).forEach(([item, qty]) => {

        const card = document.createElement('div');

        card.className =
          'bg-orange-100 rounded-xl p-3 text-center';



        card.innerHTML = `
          <div class="font-bold text-sm mb-1">
            ${item}
          </div>

          <div class="text-3xl font-bold">
            ${qty}
          </div>
        `;

        summaryContainer.appendChild(card);

      });

    }

  </script>
</body>
</html>
